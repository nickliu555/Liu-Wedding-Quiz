<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Playing · Liu Wedding Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/player.css" />
</head>
<body class="player">
  <div class="player-top">
    <div class="player-name" id="playerName">—</div>
    <div class="player-score"><span id="playerScore">0</span> pts</div>
  </div>

  <div class="player-view" id="playerView">
    <div class="state-card" id="stateCard">
      <h2>Connecting…</h2>
      <p>Hang tight.</p>
    </div>
  </div>

  <!-- Reaction bar: visible during lobby, reveal, and final phases. -->
  <div class="reaction-bar" id="reactionBar" hidden>
    <button type="button" class="reaction-btn" data-reaction="0" aria-label="laugh">😂</button>
    <button type="button" class="reaction-btn" data-reaction="1" aria-label="fire">🔥</button>
    <button type="button" class="reaction-btn" data-reaction="2" aria-label="eyes">👀</button>
    <button type="button" class="reaction-btn" data-reaction="3" aria-label="party">🎉</button>
    <button type="button" class="reaction-btn" data-reaction="4" aria-label="shock">😱</button>
    <button type="button" class="reaction-btn" data-reaction="5" aria-label="crown">👑</button>
    <div class="reaction-cooldown" id="reactionCooldown" hidden></div>
  </div>

  <footer class="credit-footer">Developed by Nick Liu (with help from Claude)</footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
